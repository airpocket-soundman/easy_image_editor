name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare web assets
        run: npm run sync-www

      - name: Add Android platform
        run: npx cap add android

      - name: Set minSdk 29
        run: sed -i "s/minSdkVersion = .*/minSdkVersion = 29/" android/variables.gradle

      - name: Set version code / name (ビルド番号を反映)
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"build-${{ github.run_number }}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Generate app icons (Web版と同じデザイン)
        run: >
          npx --yes @capacitor/assets generate --android
          --assetPath assets
          --iconBackgroundColor '#141619'
          --iconBackgroundColorDark '#141619'
          --splashBackgroundColor '#141619'
          --splashBackgroundColorDark '#141619'
          || echo "icon generation skipped"

      - name: Build release APK (unsigned)
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          UNSIGNED=$(find android/app/build/outputs/apk/release -name "*unsigned*.apk" | head -1)
          "$BT/zipalign" -f 4 "$UNSIGNED" aligned.apk
          "$BT/apksigner" sign --ks photobench.keystore \
            --ks-pass pass:photobench --ks-key-alias photobench \
            --out "PhotoBench-b${{ github.run_number }}.apk" aligned.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoBench-apk
          path: PhotoBench-b${{ github.run_number }}.apk

      - name: Remove old 'latest' release (one-time cleanup)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes --repo ${{ github.repository }} || true

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: PhotoBench Build ${{ github.run_number }}
          body: |
            mainブランチの最新コミットから自動ビルドされたAPKです。
            コミット: ${{ github.sha }}
            スマホで PhotoBench-b${{ github.run_number }}.apk をダウンロードしてインストールしてください。
          files: PhotoBench-b${{ github.run_number }}.apk
