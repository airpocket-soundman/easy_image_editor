<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#141619">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="フォトベンチ">
<title>フォトベンチ — 画像編集</title>
<style>
  :root{
    --bg:#141619; --panel:#1d2126; --panel2:#232830; --line:#2f353d;
    --text:#e9ecef; --muted:#98a1ab; --amber:#ffb454; --amber-deep:#e0912e;
    --danger:#ff6b6b; --radius:14px;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overscroll-behavior:none;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);
       display:flex;flex-direction:column;height:100dvh;}
  button{font-family:var(--sans);color:var(--text);background:var(--panel2);
         border:1px solid var(--line);border-radius:10px;padding:9px 14px;
         font-size:14px;cursor:pointer;touch-action:manipulation;}
  button:active{transform:scale(.97);}
  button.primary{background:var(--amber);border-color:var(--amber);color:#1a1204;font-weight:700;}
  button.ghost{background:transparent;border-color:transparent;color:var(--muted);}
  button:disabled{opacity:.35;pointer-events:none;}
  input[type=color]{width:38px;height:34px;border:1px solid var(--line);border-radius:9px;
                    background:var(--panel2);padding:2px;}
  input[type=range]{accent-color:var(--amber);}

  /* ---------- gallery screen ---------- */
  #galleryScreen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  header.app{padding:calc(14px + env(safe-area-inset-top)) 18px 12px;
             border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px;}
  header.app h1{margin:0;font-size:18px;letter-spacing:.06em;}
  header.app h1 b{color:var(--amber);font-weight:800;}
  header.app span{font-size:11px;color:var(--muted);letter-spacing:.14em;font-family:var(--mono);}
  #sortBar{display:flex;align-items:center;gap:8px;padding:10px 14px 0;font-size:12px;color:var(--muted);
           flex-wrap:wrap;}
  #sortBar button{padding:6px 13px;font-size:12px;border-radius:99px;}
  #sortBar button.on{background:var(--amber);border-color:var(--amber);color:#1a1204;font-weight:700;}
  #colLbl{margin-left:auto;}
  #sortBar .colBtn{padding:6px 11px;}
  #grid{flex:1;overflow-y:auto;padding:12px;display:grid;
        grid-template-columns:repeat(var(--cols,3),var(--cell,104px));gap:8px;align-content:start;
        justify-content:space-evenly;}
  .thumb{position:relative;width:var(--cell,104px);height:var(--cell,104px);border-radius:10px;overflow:hidden;
         border:1px solid var(--line);background:var(--panel2);padding:0;}
  .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .thumb figcaption{position:absolute;left:0;right:0;bottom:0;font-size:9px;padding:3px 6px;
        background:linear-gradient(transparent,rgba(0,0,0,.75));color:#dfe3e8;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;}
  .thumb .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;
        background:rgba(0,0,0,.55);color:#fff;font-size:15px;line-height:22px;text-align:center;}
  #emptyHint{margin:auto;text-align:center;color:var(--muted);font-size:14px;line-height:1.9;padding:0 32px;}
  #emptyHint .lens{width:64px;height:64px;border-radius:50%;border:2px solid var(--amber);
        margin:0 auto 14px;display:flex;align-items:center;justify-content:center;color:var(--amber);}
  #pickBar{padding:12px 16px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);}
  #pickBtn{width:100%;padding:14px;font-size:16px;}
  /* 選択モード: フローティングバー(スクロールに関係なく画面下部に固定) */
  #selBar{display:none;position:fixed;left:50%;transform:translateX(-50%);
          bottom:calc(24px + env(safe-area-inset-bottom));z-index:40;
          align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
          border-radius:99px;padding:10px 14px;box-shadow:0 6px 24px rgba(0,0,0,.55);
          white-space:nowrap;}
  #selBar.open{display:flex;}
  #selInfo{font-size:14px;color:var(--text);padding:0 4px;}
  #selBar button{padding:10px 18px;font-size:14px;border-radius:99px;}
  /* 選択モード中は全サムネイルにチェックサークルを表示 */
  #grid.selecting .thumb::after{content:'';position:absolute;top:6px;left:6px;width:22px;height:22px;
        border-radius:50%;border:2px solid #fff;background:rgba(0,0,0,.4);box-sizing:border-box;}
  #grid.selecting .thumb.sel::after{content:'✓';background:var(--amber);border-color:var(--amber);
        color:#1a1204;font-weight:800;font-size:15px;line-height:18px;text-align:center;}
  #grid.selecting .thumb.sel{outline:4px solid var(--amber);outline-offset:-4px;}
  #grid.selecting .thumb.sel img{opacity:.75;}

  /* ---------- editor screen ---------- */
  #editorScreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;}
  #editorScreen.open{display:flex;}
  #topBar{display:flex;align-items:center;gap:6px;
          padding:calc(8px + env(safe-area-inset-top)) 10px 8px;border-bottom:1px solid var(--line);}
  #fileLabel{flex:1;min-width:0;font-size:12px;color:var(--muted);font-family:var(--mono);
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;}
  #canvasWrap{flex:1;position:relative;overflow:hidden;}
  #view{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;}
  #subBar{min-height:52px;display:flex;align-items:center;gap:10px;padding:8px 12px;
          border-top:1px solid var(--line);background:var(--panel);flex-wrap:wrap;justify-content:center;}
  #subBar .lbl{font-size:12px;color:var(--muted);}
  #subBar .val{font-family:var(--mono);font-size:13px;color:var(--amber);min-width:56px;text-align:right;}
  #toolBar{display:flex;justify-content:space-around;padding:6px 4px calc(8px + env(safe-area-inset-bottom));
           border-top:1px solid var(--line);background:var(--panel);}
  .tool{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
        color:var(--muted);font-size:10px;padding:6px 8px;border-radius:10px;min-width:52px;}
  .tool svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;
            stroke-linecap:round;stroke-linejoin:round;}
  .tool.active{color:var(--amber);background:rgba(255,180,84,.12);}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .seg button{border:none;border-radius:0;background:var(--panel2);font-size:13px;padding:8px 14px;}
  .seg button.on{background:var(--amber);color:#1a1204;font-weight:700;}

  /* ---------- save modal / toast ---------- */
  #modalBack{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
             align-items:flex-end;justify-content:center;z-index:50;}
  #modalBack.open{display:flex;}
  #saveModal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;
             width:100%;max-width:520px;padding:20px 20px calc(20px + env(safe-area-inset-bottom));}
  #saveModal h2{margin:0 0 14px;font-size:16px;}
  #saveModal label{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px;}
  #saveName{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);
            background:var(--panel2);color:var(--text);font-size:15px;font-family:var(--mono);}
  #saveModal select{padding:10px;border-radius:10px;border:1px solid var(--line);
            background:var(--panel2);color:var(--text);font-size:14px;}
  #saveNote{font-size:11px;color:var(--muted);line-height:1.7;margin-top:12px;}
  #saveRow{display:flex;gap:10px;margin-top:16px;}
  #saveRow button{flex:1;padding:13px;font-size:15px;}
  #toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
         background:#0e1013;border:1px solid var(--amber);color:var(--text);padding:10px 18px;
         border-radius:99px;font-size:13px;opacity:0;transition:.25s;z-index:60;pointer-events:none;
         max-width:86vw;text-align:center;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>

<!-- ============ 一覧画面 ============ -->
<div id="galleryScreen">
  <header class="app">
    <h1>フォト<b>ベンチ</b></h1><span>PHOTO BENCH</span>
  </header>
  <div id="sortBar">
    <span>並び順:</span>
    <button data-f="added" data-label="追加">追加</button>
    <button data-f="name" data-label="名前">名前</button>
    <button data-f="mtime" data-label="日付">日付</button>
    <span id="colLbl">列:</span>
    <button class="colBtn" data-c="3">3</button>
    <button class="colBtn" data-c="4">4</button>
    <button class="colBtn" data-c="5">5</button>
  </div>
  <div id="grid">
    <div id="emptyHint">
      <div class="lens">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="5" width="18" height="15" rx="2"/><circle cx="12" cy="12.5" r="4"/>
          <path d="M8 5l1.2-2h5.6L16 5"/>
        </svg>
      </div>
      下のボタンから編集したい写真を選んでください。<br>
      複数まとめて選ぶと、ここにサムネイルが並びます。
    </div>
  </div>
  <div id="selBar">
    <span id="selInfo">0枚選択</span>
    <button id="selDel" class="primary">削除</button>
    <button id="selCancel">キャンセル</button>
  </div>
  <div id="pickBar">
    <button id="pickBtn" class="primary">写真を選ぶ</button>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/bmp,image/avif,image/heic,image/heif,image/tiff" multiple hidden>
  </div>
</div>

<!-- ============ 編集画面 ============ -->
<div id="editorScreen">
  <div id="topBar">
    <button id="backBtn" class="ghost">← 一覧</button>
    <div id="fileLabel"></div>
    <button id="undoBtn" class="ghost" disabled>元に戻す</button>
    <button id="saveBtn" class="primary">保存</button>
  </div>
  <div id="canvasWrap"><canvas id="view"></canvas></div>
  <div id="subBar"><span class="lbl">下のツールを選んで編集を始めます</span></div>
  <div id="toolBar">
    <button class="tool" data-tool="crop"><svg viewBox="0 0 24 24"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>クロップ</button>
    <button class="tool" data-tool="rot90"><svg viewBox="0 0 24 24"><path d="M3 8a9 9 0 0 1 15-4l3 3"/><path d="M21 2v5h-5"/><rect x="6" y="12" width="10" height="9" rx="1.5"/></svg>90°回転</button>
    <button class="tool" data-tool="free"><svg viewBox="0 0 24 24"><path d="M4 20L20 4"/><path d="M4 20a16 16 0 0 1 4.7-11.3"/><path d="M4 20h7"/></svg>角度回転</button>
    <button class="tool" data-tool="rect"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1.5" fill="currentColor" stroke="none" opacity=".45"/><rect x="4" y="6" width="16" height="12" rx="1.5"/></svg>塗りつぶし</button>
    <button class="tool" data-tool="pen"><svg viewBox="0 0 24 24"><path d="M12 19l7-7a2.1 2.1 0 0 0-3-3l-7 7-1.5 4.5z"/><path d="M4 21c3-.5 5-2 6-4"/></svg>ペン</button>
    <button class="tool" data-tool="arrow"><svg viewBox="0 0 24 24"><path d="M5 19L17 7"/><path d="M11 6h7v7"/></svg>矢印</button>
  </div>
</div>

<!-- ============ 保存モーダル ============ -->
<div id="modalBack">
  <div id="saveModal">
    <h2>別名で保存</h2>
    <label>ファイル名</label>
    <input id="saveName" type="text" autocomplete="off">
    <label>形式</label>
    <select id="saveFmt">
      <option value="jpeg">JPEG(写真向け・軽い)</option>
      <option value="png">PNG(透過・劣化なし)</option>
    </select>
    <p id="saveNote">スマホではブラウザの制限により「ダウンロード」フォルダに保存されます。元のフォルダへ移す場合は端末のファイルアプリをご利用ください。PC版Chromeでは保存先フォルダを選べます。</p>
    <div id="saveRow">
      <button id="saveCancel">キャンセル</button>
      <button id="saveDo" class="primary">保存する</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
/* =====================================================================
   フォトベンチ  — スマホ向け画像編集(単一ファイル / 依存なし)
   ===================================================================== */
const $ = s => document.querySelector(s);
const MAX_SIDE = 3200;          // メモリ保護のための最大辺
const HISTORY_MAX = 6;

/* ---------- バージョン表示・エラー可視化・ネイティブ判定(最優先で実行) ---------- */
const APP_VER = 'v19';
const CapNative = !!(window.Capacitor && (
  (window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) ||
  window.Capacitor.isNative ||
  (window.Capacitor.getPlatform && window.Capacitor.getPlatform() !== 'web')
));
let MediaLib = null;
try{
  if (CapNative){
    MediaLib = (window.Capacitor.registerPlugin ? window.Capacitor.registerPlugin('MediaLib') : null)
            || (window.Capacitor.Plugins ? window.Capacitor.Plugins.MediaLib : null) || null;
  }
}catch(_){
  try{ MediaLib = (window.Capacitor.Plugins && window.Capacitor.Plugins.MediaLib) || null; }catch(__){}
}
{
  const tag = document.querySelector('header.app span');
  if (tag) tag.textContent = 'PHOTO BENCH ' + APP_VER + (CapNative ? ' / APK' : ' / Web');
}
/* スクリプトエラーを画面に表示(スマホでの原因調査用) */
window.addEventListener('error', e=> toast('エラー: ' + (e.message || e.type)));
window.addEventListener('unhandledrejection', e=>
  toast('エラー: ' + ((e.reason && e.reason.message) || e.reason || 'unknown')));

/* ---------- 状態 ---------- */
let files = [];                 // {file, url, name}
let cur = null;                 // 編集中 {name, type}
let img = null;                 // 確定済み画像(オフスクリーンcanvas)
let history = [];
let mode = null;                // crop | rot90 | free | rect | pen | arrow
let dirty = false;

/* 表示変換 */
const view = $('#view'), wrap = $('#canvasWrap');
let vctx = view.getContext('2d');
let dpr = 1, vw = 0, vh = 0, scale = 1, offX = 0, offY = 0;

/* ツール別の一時状態 */
let cropRect = null;            // {x,y,w,h} 画像座標
let freeAngle = 0, freeMode = 'outer';
let rectSel = null, rectColor = '#ff3b30';
let penColor = '#ffb454', penWidth = 6, penScratch = null, penDrawing = false, penLast = null;
let arrowObj = null, arrowColor = '#ff3b30', arrowWidth = 8;
let drag = null;                // ポインタ操作の内部状態

/* ---------- ユーティリティ ---------- */
function toast(msg, ms){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'), ms || 2600);
}
function cloneCanvas(c){
  const n = document.createElement('canvas');
  n.width = c.width; n.height = c.height;
  n.getContext('2d').drawImage(c, 0, 0);
  return n;
}
function pushHistory(){
  history.push(cloneCanvas(img));
  if (history.length > HISTORY_MAX) history.shift();
  $('#undoBtn').disabled = false;
  dirty = true;
}
function undo(){
  if (!history.length) return;
  img = history.pop();
  $('#undoBtn').disabled = history.length === 0;
  cancelToolState(); fit(); render();
}
function baseName(n){ return n.replace(/\.[^.]+$/, ''); }

/* ---------- 写真ライブラリ(IndexedDBに保存し次回起動時に自動復元) ---------- */
const DB_NAME = 'photobench', DB_STORE = 'photos';
function idb(){
  return new Promise((res, rej)=>{
    const rq = indexedDB.open(DB_NAME, 1);
    rq.onupgradeneeded = ()=> rq.result.createObjectStore(DB_STORE, {keyPath:'id', autoIncrement:true});
    rq.onsuccess = ()=> res(rq.result);
    rq.onerror = ()=> rej(rq.error);
  });
}
function idbAdd(file){
  return idb().then(db=> new Promise((res, rej)=>{
    const tx = db.transaction(DB_STORE, 'readwrite');
    const rq = tx.objectStore(DB_STORE).add({name:file.name, type:file.type, blob:file, added:Date.now()});
    rq.onsuccess = ()=> res(rq.result);
    tx.onerror = ()=> rej(tx.error);
  })).catch(()=> null);
}
function idbAll(){
  return idb().then(db=> new Promise((res, rej)=>{
    const rq = db.transaction(DB_STORE).objectStore(DB_STORE).getAll();
    rq.onsuccess = ()=> res(rq.result);
    rq.onerror = ()=> rej(rq.error);
  })).catch(()=> []);
}
function idbDel(id){
  return idb().then(db=> new Promise(res=>{
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = res; tx.onerror = res;
  })).catch(()=>{});
}

/* ---------- 画像一覧 ---------- */
/* 静止画のみ許可(動画・アニメGIF等は除外) */
const STILL_IMAGE_RE = /^image\/(jpeg|jpg|png|webp|bmp|avif|heic|heif|tiff)$/i;

/* ソート(画面内ボタンで切替。同じボタンをもう一度押すと昇順/降順が反転) */
const SORTS = {
  'added-desc': (a,b)=> b.added - a.added,
  'added-asc' : (a,b)=> a.added - b.added,
  'name-asc'  : (a,b)=> a.name.localeCompare(b.name, 'ja'),
  'name-desc' : (a,b)=> b.name.localeCompare(a.name, 'ja'),
  'mtime-desc': (a,b)=> b.mtime - a.mtime,
  'mtime-asc' : (a,b)=> a.mtime - b.mtime,
};
let sortField = 'added', sortDir = 'desc';
try{
  const [f, d] = (localStorage.getItem('pb-sort') || '').split('-');
  if (SORTS[f + '-' + d]){ sortField = f; sortDir = d; }
}catch(_){}
function renderGrid(){
  const grid = $('#grid');
  for (const it of [...files].sort(SORTS[sortField + '-' + sortDir])) grid.appendChild(it.el);
}
function updateSortBar(){
  document.querySelectorAll('#sortBar button[data-f]').forEach(b=>{
    const on = b.dataset.f === sortField;
    b.classList.toggle('on', on);
    b.textContent = b.dataset.label + (on ? (sortDir === 'desc' ? ' ↓' : ' ↑') : '');
  });
}
document.querySelectorAll('#sortBar button[data-f]').forEach(b=> b.addEventListener('click', ()=>{
  const f = b.dataset.f;
  if (f === sortField) sortDir = (sortDir === 'desc') ? 'asc' : 'desc';
  else { sortField = f; sortDir = (f === 'name') ? 'asc' : 'desc'; }
  try{ localStorage.setItem('pb-sort', sortField + '-' + sortDir); }catch(_){}
  updateSortBar(); renderGrid();
}));
updateSortBar();

/* 列数切替(マスのサイズは表示エリア幅から自動計算) */
let gridCols = 3;
try{ gridCols = parseInt(localStorage.getItem('pb-cols'), 10) || 3; }catch(_){}
if (gridCols < 3 || gridCols > 5) gridCols = 3;
function updateGridCells(){
  const grid = $('#grid');
  const cs = getComputedStyle(grid);
  const pad = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
  const gap = 8;
  const w = grid.clientWidth - pad;
  const cell = Math.max(60, Math.floor((w - gap * (gridCols - 1)) / gridCols));
  grid.style.setProperty('--cols', gridCols);
  grid.style.setProperty('--cell', cell + 'px');
  document.querySelectorAll('.colBtn').forEach(b=> b.classList.toggle('on', +b.dataset.c === gridCols));
}
document.querySelectorAll('.colBtn').forEach(b=> b.addEventListener('click', ()=>{
  gridCols = +b.dataset.c;
  try{ localStorage.setItem('pb-cols', gridCols); }catch(_){}
  updateGridCells();
}));
window.addEventListener('resize', updateGridCells);
updateGridCells();

/* ---------- 複数選択モード(サムネイル長押しで開始) ---------- */
let selectMode = false;
let pendingRefresh = false;
const selected = new Set();
function enterSelect(item){
  selectMode = true; selected.clear();
  $('#selBar').classList.add('open');
  $('#grid').classList.add('selecting');
  toggleSel(item);
}
function exitSelect(){
  selectMode = false;
  for (const it of selected) it.el.classList.remove('sel');
  selected.clear();
  $('#selBar').classList.remove('open');
  $('#grid').classList.remove('selecting');
}
function toggleSel(item){
  if (selected.has(item)){ selected.delete(item); item.el.classList.remove('sel'); }
  else { selected.add(item); item.el.classList.add('sel'); }
  $('#selInfo').textContent = selected.size + '枚選択';
  if (!selected.size) exitSelect();
}
function removeTile(it){
  try{ if (typeof thumbObserver !== 'undefined' && thumbObserver) thumbObserver.unobserve(it.el); }catch(_){}
  if (it.url) URL.revokeObjectURL(it.url);
  files = files.filter(x=> x !== it);
  it.el.remove();
}
/* 長押し(500ms)で選択モード、選択モード中はタップで選択切替 */
function attachThumbHandlers(fig, item, open){
  let lpTimer = null, lpFired = false;
  fig.addEventListener('pointerdown', ()=>{
    lpFired = false;
    clearTimeout(lpTimer);
    lpTimer = setTimeout(()=>{
      lpFired = true;
      if (!selectMode) enterSelect(item); else toggleSel(item);
    }, 500);
  });
  const cancelLp = ()=> clearTimeout(lpTimer);
  fig.addEventListener('pointermove', cancelLp);   // スクロール中は発火しない
  fig.addEventListener('pointerup', cancelLp);
  fig.addEventListener('pointercancel', cancelLp);
  fig.addEventListener('contextmenu', e=> e.preventDefault());
  fig.addEventListener('click', e=>{
    if (lpFired){ e.preventDefault(); return; }
    if (selectMode){ toggleSel(item); return; }
    open();
  });
}
$('#selCancel').addEventListener('click', exitSelect);
$('#selDel').addEventListener('click', async ()=>{
  if (!selected.size) return;
  const items = [...selected];
  if (CapNative){
    if (!confirm(items.length + '枚を端末から削除しますか?')) return;
    const ids = items.filter(x=> x.nativeId).map(x=> x.nativeId);
    try{
      await MediaLib.remove({ids});
      pendingRefresh = true;               // 復帰時に一覧を再取得(キャンセル時も整合)
      exitSelect();
    }catch(e){ toast('削除に失敗: ' + ((e && e.message) || e)); }
  } else {
    if (!confirm(items.length + '枚を一覧から削除しますか?\n(端末内の元ファイルは消えません)')) return;
    for (const it of items){ if (it.id != null) idbDel(it.id); removeTile(it); }
    exitSelect();
  }
});
document.addEventListener('visibilitychange', ()=>{
  if (document.visibilityState === 'visible' && pendingRefresh){
    pendingRefresh = false;
    refreshNativeLibrary();
  }
});

function addThumb(file, id, added){
  $('#emptyHint')?.remove();
  const url = URL.createObjectURL(file);
  const fig = document.createElement('button');
  const item = {file, url, name:file.name, id,
                added: added ?? Date.now(), mtime: file.lastModified || 0, el: fig};
  files.push(item);
  fig.className = 'thumb';
  fig.innerHTML = `<img src="${url}" alt=""><figcaption></figcaption><span class="del">×</span>`;
  fig.querySelector('figcaption').textContent = file.name;
  attachThumbHandlers(fig, item, ()=> openEditor(file));
  fig.querySelector('.del').addEventListener('click', e=>{
    e.stopPropagation();
    if (!confirm('この写真を一覧から削除しますか?\n(端末内の元ファイルは消えません)')) return;
    if (id != null) idbDel(id);
    URL.revokeObjectURL(url);
    files = files.filter(x=> x !== item);
    fig.remove();
  });
  renderGrid();
}
async function addFiles(list, save = true){
  const before = list.length;
  list = list.filter(f=> STILL_IMAGE_RE.test(f.type));
  const skipped = before - list.length;
  if (skipped) toast(`静止画以外の ${skipped} 件をスキップしました`);
  for (const f of list){
    const id = save ? await idbAdd(f) : null;
    addThumb(f, id);
  }
  return list;
}
$('#pickBtn').addEventListener('click', async ()=>{
  if (window.showOpenFilePicker){   // PC版Chrome等:元フォルダを記憶できる方式
    try{
      const handles = await showOpenFilePicker({
        multiple: true,
        types: [{description:'画像', accept:{'image/*':['.png','.jpg','.jpeg','.webp','.gif','.bmp']}}]
      });
      const list = [];
      for (const h of handles){
        const f = await h.getFile();

$('#fileInput').addEventListener('change', e=>{

});
/* 起動時:保存済みの写真をサムネイル一覧に自動復元(Web/PWA版のみ。ネイティブ版は端末から直接一覧) */
(async ()=>{

  const rows = await idbAll();

/* ---------- エディタ起動 ---------- */
async function loadBitmap(file){
  try { return await createImageBitmap(file, {imageOrientation:'from-image'}); }
  catch(_){
    return new Promise((res, rej)=>{
      const im = new Image();
      im.onload = ()=>res(im); im.onerror = rej;
      im.src = URL.createObjectURL(file);
    });
  }
}
async function openEditor(file){
  toast('読み込み中…');
  let bmp;
  try { bmp = await loadBitmap(file); }
  catch(_){ toast('この画像を読み込めませんでした'); return; }
  let w = bmp.width, h = bmp.height;
  const r = Math.min(1, MAX_SIDE / Math.max(w, h));
  w = Math.max(1, Math.round(w*r)); h = Math.max(1, Math.round(h*r));
  img = document.createElement('canvas'); img.width = w; img.height = h;
  img.getContext('2d').drawImage(bmp, 0, 0, w, h);
  if (bmp.close) bmp.close();
  if (r < 1) toast(`大きな画像のため ${MAX_SIDE}px に縮小しました`);

  cur = {name:file.name, type:file.type, handle:file._handle || null, relPath:file._relPath || null};
  history = []; dirty = false; $('#undoBtn').disabled = true;
  setMode(null);
  $('#fileLabel').textContent = file.name;
  $('#editorScreen').classList.add('open');
  requestAnimationFrame(()=>{ fit(); render(); });
}
$('#backBtn').addEventListener('click', ()=>{
  if (dirty && !confirm('保存していない編集は失われます。一覧に戻りますか?')) return;
  $('#editorScreen').classList.remove('open');
  img = null; history = [];
});

/* ---------- 表示・座標変換 ---------- */
function fit(){
  dpr = window.devicePixelRatio || 1;
  vw = wrap.clientWidth; vh = wrap.clientHeight;
  view.width = Math.round(vw*dpr); view.height = Math.round(vh*dpr);
  vctx.setTransform(dpr,0,0,dpr,0,0);
  if (!img) return;
  const m = 18;
  scale = Math.min((vw-2*m)/img.width, (vh-2*m)/img.height);
  offX = (vw - img.width*scale)/2;
  offY = (vh - img.height*scale)/2;
}
const i2s = p => ({x: offX + p.x*scale, y: offY + p.y*scale});
const s2i = p => ({x: (p.x-offX)/scale, y: (p.y-offY)/scale});
const clampPt = p => ({x: Math.min(Math.max(p.x,0), img.width), y: Math.min(Math.max(p.y,0), img.height)});
window.addEventListener('resize', ()=>{ if (img){ fit(); render(); } });

/* ---------- 描画 ---------- */
function drawArrowShape(ctx, x1,y1,x2,y2, w, color){
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
  if (len < 1) return;
  const ang = Math.atan2(dy,dx);
  const head = Math.max(w*3.2, w+10);
  const bx = x2 - Math.cos(ang)*head, by = y2 - Math.sin(ang)*head;
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = w; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(bx,by); ctx.stroke();
  const hw = head*0.55, px=-Math.sin(ang), py=Math.cos(ang);
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(bx+px*hw, by+py*hw);
  ctx.lineTo(bx-px*hw, by-py*hw);
  ctx.closePath(); ctx.fill();
}
function handleDot(p, filled){
  vctx.beginPath(); vctx.arc(p.x, p.y, 9, 0, Math.PI*2);
  vctx.fillStyle = filled ? 'var(--amber)' : '#fff';
  vctx.fillStyle = filled ? '#ffb454' : '#ffffff';
  vctx.fill(); vctx.lineWidth = 2; vctx.strokeStyle = '#14161a'; vctx.stroke();
}
function render(){
  if (!img) return;
  vctx.clearRect(0,0,vw,vh);
  vctx.fillStyle = '#3a4049'; vctx.fillRect(0,0,vw,vh);   // 暗めのグレー(黒い余白と区別できる色)

  if (mode === 'free'){ renderFreePreview(); return; }

  vctx.imageSmoothingQuality = 'high';
  vctx.drawImage(img, offX, offY, img.width*scale, img.height*scale);

  if (mode === 'pen' && penScratch)
    vctx.drawImage(penScratch, offX, offY, img.width*scale, img.height*scale);

  if (mode === 'crop' && cropRect){
    const a = i2s({x:cropRect.x, y:cropRect.y});
    const w = cropRect.w*scale, h = cropRect.h*scale;
    vctx.fillStyle = 'rgba(0,0,0,.55)';
    vctx.beginPath();
    vctx.rect(offX,offY,img.width*scale,img.height*scale);
    vctx.rect(a.x,a.y,w,h);
    vctx.fill('evenodd');
    vctx.strokeStyle = '#ffb454'; vctx.lineWidth = 2;
    vctx.strokeRect(a.x,a.y,w,h);
    vctx.lineWidth = 1; vctx.strokeStyle = 'rgba(255,180,84,.5)';
    vctx.strokeRect(a.x+w/3,a.y,w/3,h); vctx.strokeRect(a.x,a.y+h/3,w,h/3);
    for (const c of cropCorners()) handleDot(i2s(c), true);
  }
  if (mode === 'rect' && rectSel){
    const a = i2s({x:rectSel.x, y:rectSel.y});
    vctx.globalAlpha = .85;
    vctx.fillStyle = rectColor;
    vctx.fillRect(a.x, a.y, rectSel.w*scale, rectSel.h*scale);
    vctx.globalAlpha = 1;
    vctx.strokeStyle = '#fff'; vctx.setLineDash([6,4]);
    vctx.strokeRect(a.x, a.y, rectSel.w*scale, rectSel.h*scale);
    vctx.setLineDash([]);
    if (rectSel.w > 0 && rectSel.h > 0)
      for (const c of rectCorners()) handleDot(i2s(c), true);
  }
  if (mode === 'arrow' && arrowObj){
    const p1 = i2s({x:arrowObj.x1,y:arrowObj.y1}), p2 = i2s({x:arrowObj.x2,y:arrowObj.y2});
    drawArrowShape(vctx, p1.x,p1.y,p2.x,p2.y, arrowObj.width*scale, arrowObj.color);
    handleDot(p1,false); handleDot(p2,true);
  }
}

/* ---------- 回転の数学 ---------- */
function normAngle(rad){
  let a = Math.abs(rad) % Math.PI;
  if (a > Math.PI/2) a = Math.PI - a;
  return a;
}
function bboxSize(w,h,rad){           // 回転画像の外接バウンディングボックス(90°回転用)
  const a = normAngle(rad), s=Math.sin(a), c=Math.cos(a);
  return {w: w*c + h*s, h: w*s + h*c};
}
function outerSize(w,h,rad){          // 全体を含む、元画像と同じ縦横比の最小矩形
  const a = normAngle(rad), s=Math.sin(a), c=Math.cos(a);
  const K = Math.max((w*c + h*s)/w, (w*s + h*c)/h);
  return {w: w*K, h: h*K};
}
function innerSize(w,h,rad){          // 回転画像に内接する、元画像と同じ縦横比の最大矩形
  const a = normAngle(rad), s=Math.sin(a), c=Math.cos(a);
  const k = Math.min(w/(w*c + h*s), h/(w*s + h*c));
  return {w: w*k, h: h*k};
}
function applyRotation(src, rad, fitMode){
  const w = src.width, h = src.height;
  const sz = (fitMode==='bbox')  ? bboxSize(w,h,rad)
           : (fitMode==='outer') ? outerSize(w,h,rad)
           : innerSize(w,h,rad);
  const c = document.createElement('canvas');
  c.width = Math.max(1, Math.round(sz.w));
  c.height = Math.max(1, Math.round(sz.h));
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#000';               // 余白(画像の外側)は黒で埋める
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.imageSmoothingQuality = 'high';
  ctx.translate(c.width/2, c.height/2);
  ctx.rotate(rad);
  ctx.drawImage(src, -w/2, -h/2);
  ctx.setTransform(1, 0, 0, 1, 0, 0);   // 変換をリセット(以後の描画がずれないように)
  return c;
}
function renderFreePreview(){
  const rad = freeAngle*Math.PI/180;
  const ob = outerSize(img.width, img.height, rad);
  const m = 18;
  const ps = Math.min((vw-2*m)/ob.w, (vh-2*m)/ob.h);
  const cx = vw/2, cy = vh/2;
  vctx.save();
  vctx.translate(cx,cy); vctx.rotate(rad);
  vctx.imageSmoothingQuality = 'high';
  vctx.drawImage(img, -img.width*ps/2, -img.height*ps/2, img.width*ps, img.height*ps);
  vctx.restore();
  if (freeMode === 'inner'){
    const ib = innerSize(img.width, img.height, rad);
    const w = ib.w*ps, h = ib.h*ps;
    vctx.fillStyle = 'rgba(0,0,0,.6)';
    vctx.beginPath();
    vctx.rect(0,0,vw,vh);
    vctx.rect(cx-w/2, cy-h/2, w, h);
    vctx.fill('evenodd');
    vctx.strokeStyle = '#ffb454'; vctx.lineWidth = 2;
    vctx.strokeRect(cx-w/2, cy-h/2, w, h);
  } else {
    vctx.strokeStyle = 'rgba(255,180,84,.7)'; vctx.lineWidth = 1.5;
    vctx.setLineDash([6,4]);
    vctx.strokeRect(cx-ob.w*ps/2, cy-ob.h*ps/2, ob.w*ps, ob.h*ps);
    vctx.setLineDash([]);
  }
}

/* ---------- ツール切替とサブバー ---------- */
function cancelToolState(){
  cropRect = null; rectSel = null; arrowObj = null;
  penScratch = null; penDrawing = false; freeAngle = 0; drag = null;
}
function setMode(m){
  cancelToolState();
  mode = m;
  document.querySelectorAll('.tool').forEach(b=>
    b.classList.toggle('active', b.dataset.tool === m));
  buildSubBar();
  if (img) render();
}
document.querySelectorAll('.tool').forEach(b=>
  b.addEventListener('click', ()=> setMode(b.dataset.tool === mode ? null : b.dataset.tool)));

function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }
function buildSubBar(){
  const bar = $('#subBar'); bar.innerHTML = '';
  const add = n => { bar.appendChild(n); return n; };

  if (!mode){
    add(el('<span class="lbl">下のツールを選んで編集を始めます</span>'));
    return;
  }
  if (mode === 'crop'){
    cropRect = {x:0, y:0, w:img.width, h:img.height};
    add(el('<span class="lbl">枠をドラッグして範囲を調整</span>'));
    const ap = add(el('<button class="primary">切り抜く</button>'));
    ap.addEventListener('click', ()=>{
      const r = cropRect;
      if (r.w < 2 || r.h < 2){ toast('範囲が小さすぎます'); return; }
      pushHistory();
      const c = document.createElement('canvas');
      c.width = Math.round(r.w); c.height = Math.round(r.h);
      c.getContext('2d').drawImage(img, r.x, r.y, r.w, r.h, 0, 0, c.width, c.height);
      img = c; setMode(null); fit(); render();
    });
  }
  if (mode === 'rot90'){
    const l = add(el('<button>↺ 左に90°</button>'));
    const r = add(el('<button>↻ 右に90°</button>'));
    const rot = d => { pushHistory(); img = applyRotation(img, d*Math.PI/2, 'bbox'); fit(); render(); };
    l.addEventListener('click', ()=>rot(-1));
    r.addEventListener('click', ()=>rot(1));
  }
  if (mode === 'free'){
    const minus = add(el('<button>-1°</button>'));
    const sl = add(el('<input type="range" min="-180" max="180" step="0.5" value="0" style="flex:1;min-width:110px;max-width:240px">'));
    const plus = add(el('<button>+1°</button>'));
    const val = add(el('<span class="val">0.0°</span>'));
    const seg = add(el(
      `<div class="seg"><button data-m="inner"${freeMode==='inner'?' class="on"':''}>内接</button>` +
      `<button data-m="outer"${freeMode==='outer'?' class="on"':''}>外接</button></div>`));
    const ap = add(el('<button class="primary">適用</button>'));
    const upd = ()=>{ val.textContent = freeAngle.toFixed(1)+'°'; render(); };
    sl.addEventListener('input', ()=>{ freeAngle = +sl.value; upd(); });
    minus.addEventListener('click', ()=>{ freeAngle = Math.max(-180, freeAngle-1); sl.value = freeAngle; upd(); });
    plus.addEventListener('click', ()=>{ freeAngle = Math.min(180, freeAngle+1); sl.value = freeAngle; upd(); });
    seg.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{
      freeMode = b.dataset.m;
      seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
      render();
    }));
    ap.addEventListener('click', ()=>{
      if (Math.abs(freeAngle) < .05){ setMode(null); return; }
      pushHistory();
      img = applyRotation(img, freeAngle*Math.PI/180, freeMode);
      setMode(null); fit(); render();
    });
  }
  if (mode === 'rect'){
    const col = add(el(`<input type="color" value="${rectColor}">`));
    add(el('<span class="lbl">ドラッグで矩形を指定(四隅・辺で調整)</span>'));
    const ap = add(el('<button class="primary" disabled>塗りつぶす</button>'));
    col.addEventListener('input', ()=>{ rectColor = col.value; render(); });
    ap.id = 'rectApply';
    ap.addEventListener('click', ()=>{
      if (!rectSel || rectSel.w<1 || rectSel.h<1) return;
      pushHistory();
      const ctx = img.getContext('2d');
      ctx.fillStyle = rectColor;
      ctx.fillRect(rectSel.x, rectSel.y, rectSel.w, rectSel.h);
      rectSel = null; ap.disabled = true; render();
    });
  }
  if (mode === 'pen'){
    const col = add(el(`<input type="color" value="${penColor}">`));
    add(el('<span class="lbl">太さ</span>'));
    const sl = add(el(`<input type="range" min="1" max="40" value="${penWidth}" style="width:120px">`));
    add(el('<span class="lbl">なぞって描画(1筆ごとに確定)</span>'));
    col.addEventListener('input', ()=> penColor = col.value);
    sl.addEventListener('input', ()=> penWidth = +sl.value);
    penScratch = document.createElement('canvas');
    penScratch.width = img.width; penScratch.height = img.height;
  }
  if (mode === 'arrow'){
    const col = add(el(`<input type="color" value="${arrowColor}">`));
    add(el('<span class="lbl">太さ</span>'));
    const sl = add(el(`<input type="range" min="2" max="120" value="${arrowWidth}" style="width:110px">`));
    const ap = add(el('<button class="primary" disabled>確定</button>'));
    ap.id = 'arrowApply';
    col.addEventListener('input', ()=>{
      arrowColor = col.value;
      if (arrowObj){ arrowObj.color = arrowColor; render(); }
    });
    sl.addEventListener('input', ()=>{
      arrowWidth = +sl.value;
      if (arrowObj){ arrowObj.width = arrowWidth; render(); }
    });
    ap.addEventListener('click', ()=>{
      if (!arrowObj) return;
      pushHistory();
      drawArrowShape(img.getContext('2d'),
        arrowObj.x1, arrowObj.y1, arrowObj.x2, arrowObj.y2,
        arrowObj.width, arrowObj.color);
      arrowObj = null; ap.disabled = true; render();
    });
  }
}

/* ---------- ポインタ操作 ---------- */
function cropCorners(){
  const r = cropRect;
  return [{x:r.x,y:r.y},{x:r.x+r.w,y:r.y},{x:r.x,y:r.y+r.h},{x:r.x+r.w,y:r.y+r.h}];
}
function rectCorners(){
  const r = rectSel;
  return [{x:r.x,y:r.y},{x:r.x+r.w,y:r.y},{x:r.x,y:r.y+r.h},{x:r.x+r.w,y:r.y+r.h}];
}
function pos(e){
  const b = view.getBoundingClientRect();
  return {x: e.clientX - b.left, y: e.clientY - b.top};
}
const distToSeg = (p,a,b)=>{
  const dx=b.x-a.x, dy=b.y-a.y, l2=dx*dx+dy*dy;
  let t = l2 ? ((p.x-a.x)*dx+(p.y-a.y)*dy)/l2 : 0;
  t = Math.max(0,Math.min(1,t));
  return Math.hypot(p.x-(a.x+dx*t), p.y-(a.y+dy*t));
};
function hitEdge(corners, sp){        // 0:上 1:下 2:左 3:右 / corners=[左上,右上,左下,右下](画像座標)
  const [tl,tr,bl,br] = corners.map(i2s);
  if (distToSeg(sp, tl, tr) < 14) return 0;
  if (distToSeg(sp, bl, br) < 14) return 1;
  if (distToSeg(sp, tl, bl) < 14) return 2;
  if (distToSeg(sp, tr, br) < 14) return 3;
  return -1;
}
function edgeResize(r, edge, ip){     // 指定した辺だけ動かす(反対側は固定)
  let x1=r.x, y1=r.y, x2=r.x+r.w, y2=r.y+r.h;
  if (edge===0) y1 = ip.y;
  if (edge===1) y2 = ip.y;
  if (edge===2) x1 = ip.x;
  if (edge===3) x2 = ip.x;
  return {x:Math.min(x1,x2), y:Math.min(y1,y2), w:Math.abs(x2-x1), h:Math.abs(y2-y1)};
}

view.addEventListener('pointerdown', e=>{
  if (!img || !mode || mode==='free' || mode==='rot90') return;
  if (drag) return;                                  // 2本目の指は無視
  view.setPointerCapture(e.pointerId);
  const sp = pos(e), ip = clampPt(s2i(sp));

  if (mode === 'crop'){
    const cs = cropCorners();
    for (let i=0;i<4;i++){
      const c = i2s(cs[i]);
      if (Math.hypot(sp.x-c.x, sp.y-c.y) < 20){ drag = {kind:'corner', i, id:e.pointerId}; return; }
    }
    const ce = hitEdge(cs, sp);
    if (ce >= 0){ drag = {kind:'edge', edge:ce, id:e.pointerId}; return; }
    const a = i2s({x:cropRect.x,y:cropRect.y});
    if (sp.x>a.x && sp.x<a.x+cropRect.w*scale && sp.y>a.y && sp.y<a.y+cropRect.h*scale)
      drag = {kind:'move', id:e.pointerId, start:ip, orig:{...cropRect}};
    return;
  }
  if (mode === 'rect'){
    if (rectSel && rectSel.w > 0 && rectSel.h > 0){
      const cs = rectCorners();
      for (let i=0;i<4;i++){
        const c = i2s(cs[i]);
        if (Math.hypot(sp.x-c.x, sp.y-c.y) < 20){ drag = {kind:'rect-corner', i, id:e.pointerId}; return; }
      }
      const re = hitEdge(cs, sp);
      if (re >= 0){ drag = {kind:'rect-edge', edge:re, id:e.pointerId}; return; }
      const a = i2s({x:rectSel.x,y:rectSel.y});
      if (sp.x>a.x && sp.x<a.x+rectSel.w*scale && sp.y>a.y && sp.y<a.y+rectSel.h*scale){
        drag = {kind:'rect-move', id:e.pointerId, start:ip, orig:{...rectSel}};
        return;
      }
    }
    drag = {kind:'rect', id:e.pointerId, start:ip};
    rectSel = {x:ip.x, y:ip.y, w:0, h:0};
    return;
  }
  if (mode === 'pen'){
    penDrawing = true; penLast = ip; drag = {kind:'pen', id:e.pointerId};
    const ctx = penScratch.getContext('2d');
    ctx.strokeStyle = penColor; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.lineWidth = Math.max(1, penWidth/scale);
    ctx.beginPath();
    ctx.moveTo(ip.x, ip.y); ctx.lineTo(ip.x+.01, ip.y+.01); ctx.stroke();
    render();
    return;
  }
  if (mode === 'arrow'){
    if (arrowObj){
      const p1 = i2s({x:arrowObj.x1,y:arrowObj.y1}), p2 = i2s({x:arrowObj.x2,y:arrowObj.y2});
      if (Math.hypot(sp.x-p2.x, sp.y-p2.y) < 22){ drag={kind:'a-head', id:e.pointerId}; return; }
      if (Math.hypot(sp.x-p1.x, sp.y-p1.y) < 22){ drag={kind:'a-tail', id:e.pointerId}; return; }
      if (distToSeg(sp,p1,p2) < 18){
        drag={kind:'a-move', id:e.pointerId, start:ip, orig:{...arrowObj}}; return;
      }
    }
    drag = {kind:'a-new', id:e.pointerId, start:ip};
    arrowObj = {x1:ip.x, y1:ip.y, x2:ip.x, y2:ip.y, color:arrowColor, width:arrowWidth};
    return;
  }
});

view.addEventListener('pointermove', e=>{
  if (!drag || e.pointerId !== drag.id) return;
  const ip = clampPt(s2i(pos(e)));

  if (drag.kind === 'corner'){
    const cs = cropCorners();
    const opp = cs[3-drag.i];                       // 対角を固定
    cropRect = {
      x: Math.min(ip.x, opp.x), y: Math.min(ip.y, opp.y),
      w: Math.abs(ip.x-opp.x), h: Math.abs(ip.y-opp.y)
    };
  }
  else if (drag.kind === 'move'){
    let nx = drag.orig.x + (ip.x - drag.start.x);
    let ny = drag.orig.y + (ip.y - drag.start.y);
    nx = Math.max(0, Math.min(nx, img.width - drag.orig.w));
    ny = Math.max(0, Math.min(ny, img.height - drag.orig.h));
    cropRect = {x:nx, y:ny, w:drag.orig.w, h:drag.orig.h};
  }
  else if (drag.kind === 'rect'){
    rectSel = {
      x: Math.min(ip.x, drag.start.x), y: Math.min(ip.y, drag.start.y),
      w: Math.abs(ip.x-drag.start.x), h: Math.abs(ip.y-drag.start.y)
    };
  }
  else if (drag.kind === 'edge'){ cropRect = edgeResize(cropRect, drag.edge, ip); }
  else if (drag.kind === 'rect-edge'){ rectSel = edgeResize(rectSel, drag.edge, ip); }
  else if (drag.kind === 'rect-corner'){
    const cs = rectCorners();
    const opp = cs[3-drag.i];                       // 対角を固定
    rectSel = {
      x: Math.min(ip.x, opp.x), y: Math.min(ip.y, opp.y),
      w: Math.abs(ip.x-opp.x), h: Math.abs(ip.y-opp.y)
    };
  }
  else if (drag.kind === 'rect-move'){
    let nx = drag.orig.x + (ip.x - drag.start.x);
    let ny = drag.orig.y + (ip.y - drag.start.y);
    nx = Math.max(0, Math.min(nx, img.width - drag.orig.w));
    ny = Math.max(0, Math.min(ny, img.height - drag.orig.h));
    rectSel = {x:nx, y:ny, w:drag.orig.w, h:drag.orig.h};
  }
  else if (drag.kind === 'pen'){
    const ctx = penScratch.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(penLast.x, penLast.y); ctx.lineTo(ip.x, ip.y); ctx.stroke();
    penLast = ip;
  }
  else if (drag.kind === 'a-new' || drag.kind === 'a-head'){ arrowObj.x2 = ip.x; arrowObj.y2 = ip.y; }
  else if (drag.kind === 'a-tail'){ arrowObj.x1 = ip.x; arrowObj.y1 = ip.y; }
  else if (drag.kind === 'a-move'){
    const dx = ip.x - drag.start.x, dy = ip.y - drag.start.y;
    arrowObj.x1 = drag.orig.x1+dx; arrowObj.y1 = drag.orig.y1+dy;
    arrowObj.x2 = drag.orig.x2+dx; arrowObj.y2 = drag.orig.y2+dy;
  }
  render();
});

function pointerEnd(e){
  if (!drag || e.pointerId !== drag.id) return;
  if (drag.kind === 'pen' && penDrawing){
    penDrawing = false;
    pushHistory();
    img.getContext('2d').drawImage(penScratch, 0, 0);
    penScratch.getContext('2d').clearRect(0,0,penScratch.width,penScratch.height);
  }
  if (drag.kind.startsWith('rect')){
    const b = $('#rectApply');
    if (b) b.disabled = !(rectSel && rectSel.w>1 && rectSel.h>1);
  }
  if (drag.kind.startsWith('a-')){
    const b = $('#arrowApply');
    if (b) b.disabled = !(arrowObj && Math.hypot(arrowObj.x2-arrowObj.x1, arrowObj.y2-arrowObj.y1) > 4);
  }
  drag = null;
  render();
}
view.addEventListener('pointerup', pointerEnd);
view.addEventListener('pointercancel', pointerEnd);

/* ---------- 保存 ---------- */
$('#saveBtn').addEventListener('click', ()=>{
  $('#saveName').value = baseName(cur.name) + '_edited';
  $('#saveFmt').value = (cur.type === 'image/png') ? 'png' : 'jpeg';
  if (CapNative){
    const dst = cur.relPath || 'Pictures/PhotoBench';
    $('#saveNote').textContent = '保存先: ' + dst + ' (元の写真と同じフォルダに新しいファイルとして保存します。元の写真は上書きされません)';
  }
  $('#modalBack').classList.add('open');
});
$('#saveCancel').addEventListener('click', ()=> $('#modalBack').classList.remove('open'));
$('#modalBack').addEventListener('click', e=>{
  if (e.target === $('#modalBack')) $('#modalBack').classList.remove('open');
});
$('#saveDo').addEventListener('click', async ()=>{
  const fmt = $('#saveFmt').value;
  const name = ($('#saveName').value.trim() || 'edited') + (fmt==='png' ? '.png' : '.jpg');
  let src = img;
  if (fmt === 'jpeg'){                       // JPEGは透過不可のため白背景を敷く
    src = document.createElement('canvas');
    src.width = img.width; src.height = img.height;
    const c = src.getContext('2d');
    c.fillStyle = '#fff'; c.fillRect(0,0,src.width,src.height);
    c.drawImage(img, 0, 0);
  }
  const blob = await new Promise(res=>
    src.toBlob(res, fmt==='png' ? 'image/png' : 'image/jpeg', 0.92));
  if (!blob){ toast('保存に失敗しました'); return; }

  if (CapNative){                            // ネイティブ版:即座に画面を戻し、保存は裏で実行
    finishSave();
    saveNative(blob, name)
      .then(()=> refreshNativeLibrary())     // 保存した画像を一覧に反映
      .catch(e=> toast('保存に失敗: ' + ((e && e.message) || e), 6000));
    return;
  }

  if (window.showSaveFilePicker){            // PC版Chrome等:フォルダを選んで保存
    try{
      const opt = {
        suggestedName: name,
        types:[{description:'画像', accept:{[blob.type]:[fmt==='png'?'.png':'.jpg']}}]
      };
      if (cur.handle) opt.startIn = cur.handle;   // 元ファイルのフォルダを初期表示
      const h = await showSaveFilePicker(opt);
      const w = await h.createWritable();
      await w.write(blob); await w.close();
      finishSave(); return;
    }catch(err){ if (err.name === 'AbortError') return; /* 失敗時はDLへ */ }
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  finishSave();
});
function finishSave(){
  $('#modalBack').classList.remove('open');
  dirty = false;
}

/* ---------- ネイティブ(Capacitor)連携 ----------
   APK版では端末内の写真を自動で一覧表示し、元のフォルダへ直接保存する
   (APP_VER / CapNative / MediaLib はスクリプト冒頭で定義済み) */
function b64toFile(b64, name, mime){
  const bin = atob(b64);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return new File([u8], name, {type: mime});
}
/* サムネイルは「画面に見えている範囲+周辺600px」だけを、同時3件までで順次生成する */
const thumbQueue = [];
let thumbBusy = 0;
function queueThumb(im, imgEl){
  thumbQueue.push({im, imgEl});
  pumpThumbs();
}
function pumpThumbs(){
  while (thumbBusy < 2 && thumbQueue.length){
    const {im, imgEl} = thumbQueue.shift();
    thumbBusy++;
    MediaLib.thumb({id: im.id, size: 256})
      .then(r=>{ imgEl.src = 'data:image/jpeg;base64,' + r.data; })
      .catch(()=>{})
      .finally(()=>{ thumbBusy--; pumpThumbs(); });
  }
}
const thumbObserver = ('IntersectionObserver' in window)
  ? new IntersectionObserver(entries=>{
      for (const en of entries){
        if (en.isIntersecting){
          thumbObserver.unobserve(en.target);
          const d = en.target._pb;
          if (d) queueThumb(d.im, d.imgEl);
        }
      }
    }, {rootMargin: '200px'})
  : null;

function addNativeThumb(im){
  $('#emptyHint')?.remove();
  const fig = document.createElement('button');
  const item = {nativeId: im.id, name: im.name, added: im.mtime, mtime: im.mtime, el: fig};
  files.push(item);
  fig.className = 'thumb';
  fig.innerHTML = `<img alt=""><figcaption></figcaption>`;
  const imgEl = fig.querySelector('img');
  fig.querySelector('figcaption').textContent = im.name;
  if (thumbObserver){ fig._pb = {im, imgEl}; thumbObserver.observe(fig); }
  else queueThumb(im, imgEl);
  attachThumbHandlers(fig, item, async ()=>{
    toast('読み込み中…');
    try{
      const f = await nativeFileOf(im);
      f._relPath = im.relPath || '';
      openEditor(f);
    }catch(e){ toast('読み込み失敗: ' + ((e && e.message) || e)); }
  });
}
async function refreshNativeLibrary(){
  if (!CapNative) return;
  for (const it of files){
    try{ if (thumbObserver) thumbObserver.unobserve(it.el); }catch(_){}
    it.el.remove();
  }
  files = [];
  thumbQueue.length = 0;
  await initNativeLibrary();
}
async function nativeFileOf(im){
  if (im.path){
    try{
      const res = await fetch(window.Capacitor.convertFileSrc(im.path));
      if (res.ok){
        const blob = await res.blob();
        return new File([blob], im.name, {type: im.mime || blob.type || 'image/jpeg'});
      }
    }catch(_){ /* プラグイン経由にフォールバック */ }
  }
  const r = await MediaLib.read({id: im.id});
  return b64toFile(r.data, im.name, im.mime || 'image/jpeg');
}
async function initNativeLibrary(){
  const bar = $('#pickBar'); if (bar) bar.style.display = 'none';   // ネイティブ版は「写真を選ぶ」廃止
  const hint = $('#emptyHint'); if (hint) hint.textContent = '写真を読み込んでいます…';
  if (!MediaLib){ toast('ネイティブプラグインを初期化できませんでした'); return; }
  try{
    const r = await MediaLib.list({limit: 500});
    const list = (r.images || []).filter(im=> im.path);
    for (const im of list) addNativeThumb(im);
    renderGrid();
    if (!list.length) toast('端末に写真が見つかりませんでした');
  }catch(e){
    toast('写真にアクセスできません: ' + ((e && e.message) || e));
    const h = $('#emptyHint');
    if (h) h.textContent = '設定 → アプリ → フォトベンチ → 権限 で「写真と動画」を許可して、アプリを開き直してください。';
  }
}
async function saveNative(blob, name){
  const b64 = await new Promise(res=>{
    const fr = new FileReader();
    fr.onload = ()=> res(String(fr.result).split(',')[1]);
    fr.readAsDataURL(blob);
  });
  return MediaLib.save({name, mime: blob.type, data: b64, relPath: cur.relPath || ''});
}
if (CapNative) initNativeLibrary();

/* ---------- Android戻るボタン: アプリ内の画面を戻る ---------- */
if (CapNative){
  const CapApp = window.Capacitor.Plugins && window.Capacitor.Plugins.App;
  if (CapApp && CapApp.addListener){
    CapApp.addListener('backButton', ()=>{
      if ($('#modalBack').classList.contains('open')){        // 保存モーダル → 閉じる
        $('#modalBack').classList.remove('open');
        return;
      }
      if (selectMode){ exitSelect(); return; }                // 選択モード → 解除
      if ($('#editorScreen').classList.contains('open')){     // 編集画面 → 一覧へ
        $('#backBtn').click();
        return;
      }
      if (CapApp.minimizeApp) CapApp.minimizeApp();           // 一覧 → アプリを最小化
      else if (CapApp.exitApp) CapApp.exitApp();
    });
  }
}

/* ---------- PWA: Service Worker 登録 ---------- */
if ('serviceWorker' in navigator && !CapNative){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* file://等では無視 */ });
  });
}

/* ---------- PWA: 共有ターゲット受信(ギャラリーの「共有」から開く) ---------- */
(async function loadSharedImages(){
  const q = new URLSearchParams(location.search);
  if (!q.has('shared')) return;
  const n = +q.get('shared') || 0;
  window.history.replaceState(null, '', location.pathname);
  const cache = await caches.open('shared-images');
  const list = [];
  for (let i = 0; i < n; i++){
    const res = await cache.match('./shared-' + i);
    if (!res) continue;
    const blob = await res.blob();
    const name = decodeURIComponent(res.headers.get('X-Name') || ('shared-' + i + '.jpg'));
    list.push(new File([blob], name, {type: blob.type || 'image/jpeg'}));
    await cache.delete('./shared-' + i);
  }
  if (!list.length) return;
  await addFiles(list);
  if (list.length === 1) openEditor(list[0]);
})();
